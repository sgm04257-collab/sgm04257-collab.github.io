<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>페이지를 찾을 수 없습니다</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 48px 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    .code { font-size: 72px; font-weight: 800; color: #e0e0e0; line-height: 1; }
    h1 { font-size: 22px; font-weight: 700; margin: 16px 0 8px; }
    p { font-size: 14px; color: #777; line-height: 1.6; margin-bottom: 28px; }
    a.btn {
      display: inline-block;
      padding: 12px 28px;
      background: #1a1a2e;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .sub { margin-top: 20px; font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 이동되었거나 더 이상 존재하지 않습니다.<br>새 주소로 접속해 주세요.</p>
    <a class="btn" href="https://metanet-edu-hub.vercel.app">새 페이지로 이동 →</a>
    <div class="sub">메타넷 AI 교육 허브는 Vercel로 이전되었습니다.</div>
  </div>
</body>
</html>
